<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ filename }} (точный preview)</title>
    <style>
        html,body{margin:0;padding:0}
        *{box-sizing:border-box}
        body{font-family:"Times New Roman",Times,serif;background:#525659}
        .header{position:fixed;top:0;left:0;right:0;height:60px;background:#323639;border-bottom:1px solid #444;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:1000;color:#fff}
        .header-center{display:flex;gap:30px}
        .stat{text-align:center}.stat-value{font-size:18px;font-weight:bold}
        .stat-value.orig{color:#4CAF50}.stat-value.plag{color:#FF723A}.stat-value.cit{color:#B2CF55}
        .stat-label{font-size:10px;color:#999;text-transform:uppercase}
        .doc{margin-top:60px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:20px}
        .page{position:relative;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.4)}
        .visual-layer{position:absolute;inset:0;z-index:1;overflow:hidden}
        .visual-layer img{width:100%;height:100%;display:block}
        .highlight-layer{position:absolute;inset:0;z-index:2;pointer-events:none}
        .highlight-rect{position:absolute;background:rgba(255,114,58,.3);border-radius:2px}
        .highlight-rect.cit{background:rgba(178,207,85,.4)}
        .badge{position:absolute;background:#FF723A;color:#fff;font-size:9px;font-weight:bold;padding:1px 4px;border-radius:2px;z-index:3}
        .badge.cit{background:#B2CF55}
    </style>
</head>
<body>
<div class="header">
    <div>📄 {{ filename }} (точный HTML preview)</div>
    <div class="header-center">
        <div class="stat"><div class="stat-value orig">{{ orig }}%</div><div class="stat-label">Оригинальность</div></div>
        <div class="stat"><div class="stat-value plag">{{ plag }}%</div><div class="stat-label">Заимствования</div></div>
        <div class="stat"><div class="stat-value cit">{{ cit }}%</div><div class="stat-label">Цитирование</div></div>
    </div>
    <div>Страниц: {{ total }}</div>
</div>
<div class="doc">
    {% for p in pages %}
    <div class="page" style="width:{{ p.w }}pt;height:{{ p.h }}pt;">
        <div class="visual-layer"><img src="data:image/png;base64,{{ p.image }}" alt="page {{ loop.index }}"></div>
        <div class="highlight-layer">
            {% for b in p.blocks %}
            <div class="highlight-rect {% if b.cit %}cit{% endif %}" style="left:{{ b.x }}pt;top:{{ b.y }}pt;width:{{ b.w }}pt;height:{{ b.h }}pt;"></div>
            <span class="badge {% if b.cit %}cit{% endif %}" style="left:{{ b.x + b.w }}pt;top:{{ b.y }}pt;">{{ b.sid }}</span>
            {% endfor %}
        </div>
    </div>
    {% endfor %}
</div>
</body>
</html>
