<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Просмотр результата</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        .toolbar {
            height: 50px; background: #333; color: white;
            display: flex; align-items: center; padding: 0 20px;
            justify-content: space-between;
        }
        .pdf-container {
            height: calc(100% - 50px);
            width: 100%;
        }
        a { color: #ddd; text-decoration: none; padding: 10px; border: 1px solid #555; border-radius: 4px; }
        a:hover { background: #444; color: white; }
    </style>
</head>
<body>

<div class="toolbar">
    <div>Результат проверки</div>
    <div>
        <a href="/uploads/{{ pdf_file }}" download>Скачать PDF</a>
        <a href="/">Загрузить новый</a>
    </div>
</div>

<div class="pdf-container">
    <iframe src="/uploads/{{ pdf_file }}" width="100%" height="100%" style="border: none;">
    </iframe>
</div>

</body>
</html>
